# -------------------------
# GENERAL
# -------------------------
name: UHDM_NTIRE_LLIE_StableTraining   # ✅ NEW SAFE NAME
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 100

# -------------------------
# DATASETS
# -------------------------
datasets:
  train:
    name: TrainSet
    type: Dataset_PairedImage
    dataroot_gt: /NTIRE2026/C9_LLIE/Training/train_gt
    dataroot_lq: /NTIRE2026/C9_LLIE/Training/train_inp
    io_backend:
      type: disk
    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 12
    gt_size: 256
    use_hflip: true
    use_rot: true
    geometric_augs: true
    dataset_enlarge_ratio: 1

  val:
    name: ValSet
    type: Dataset_PairedImage
    dataroot_gt: /NTIRE2026/C9_LLIE/Validation/train_gt
    dataroot_lq: /NTIRE2026/C9_LLIE/Validation/train_inp
    io_backend:
      type: disk

# -------------------------
# NETWORK
# -------------------------
network_g:
  type: UHDM

# -------------------------
# PATH (VERY IMPORTANT)
# -------------------------
path:
  resume_state: /NTIRE2026/runs/C9_LLIE/KLETech-CEVI_LowLightEnhancement/experiments/UHDM_NTIRE_LLIE_StableTraining/training_states/180000.state
  strict_load_g: true

# -------------------------
# TRAIN
# -------------------------
train:
  total_iter: 320000
  warmup_iter: -1
  use_grad_clip: true

  mixing_augs:
    mixup: false
    mixup_beta: 1.2
    use_identity: false

  optim_g:
    type: Adam
    lr: 0.00005
    betas: [0.9, 0.999]

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [140000]
    restart_weights: [1]
    eta_min: 0.0000001

  pixel_opt:
    type: multi_VGGPerceptualLoss
    loss_weight: 1
    reduction: mean

# -------------------------
# VALIDATION
# -------------------------
val:
  val_freq: 5000
  save_img: false
  rgb2bgr: true
  use_image: false

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false

# -------------------------
# LOGGER
# -------------------------
logger:
  print_freq: 100
  save_checkpoint_freq: 5000
  use_tb_logger: true

dist_params:
  backend: nccl
  port: 29500
