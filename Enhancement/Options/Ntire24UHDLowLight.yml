name: UHDM_LLIE_FINETUNE_AGGRESSIVE
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 100

datasets:

  train:
    name: TrainSet
    type: Dataset_PairedImage

    dataroot_gt: /NTIRE2026/C9_LLIE/Training/train_gt
    dataroot_lq: /NTIRE2026/C9_LLIE/Training/train_inp

    geometric_augs: true

    io_backend:
      type: disk

    use_shuffle: true
    num_worker_per_gpu: 6
    batch_size_per_gpu: 10

    gt_size: 384

    use_hflip: true
    use_rot: true

    dataset_enlarge_ratio: 4

    pin_memory: true
    persistent_workers: true
    prefetch_mode: cuda


  val:
    name: ValSet
    type: Dataset_PairedImage

    dataroot_gt: /NTIRE2026/C9_LLIE/Validation/train_gt
    dataroot_lq: /NTIRE2026/C9_LLIE/Validation/train_inp

    io_backend:
      type: disk


  test:
    name: TestSet
    type: Dataset_SingleImage

    dataroot_lq: /NTIRE2026/C9_LLIE/Testing/T1_Pair_input

    io_backend:
      type: disk


network_g:
  type: UHDM


path:
  pretrain_network_g: /NTIRE2026/runs/C9_LLIE/KLETech-CEVI_LowLightEnhancement/forced_checkpoints_LLIE/net_g_250000.pth
  strict_load_g: true


train:

  total_iter: 290000
  warmup_iter: -1

  ema_decay: 0.9997
  use_grad_clip: true

  optim_g:
    type: AdamW
    lr: 0.00003
    betas: [0.9, 0.999]
    weight_decay: 0.000001

  scheduler:
    type: MultiStepLR
    milestones: [260000, 275000, 285000]
    gamma: 0.5


  # -------- LOSSES --------

  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 1.0

  ssim_opt:
    type: SSIMLoss
    loss_weight: 0.1

  edge_opt:
    type: EdgeLoss
    loss_weight: 0.15


val:

  val_freq: 1000
  save_img: true
  rgb2bgr: false
  use_image: false

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false


logger:
  print_freq: 50
  save_checkpoint_freq: 1000
  use_tb_logger: true


fp16: true